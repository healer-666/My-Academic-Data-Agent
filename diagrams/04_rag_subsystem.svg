<rect x="70" y="520" width="5" height="145" rx="3" fill="#334155"/>
<text class="section" x="88" y="549" fill="#334155">混合检索策略</text>
<text class="small" x="95" y="555" >密集向量：OpenAI Embedding -&gt; ChromaDB</text>
<text class="small" x="95" y="579" >关键词：TF-IDF JSON 索引，无 embedding 时可回退</text>
<text class="small" x="95" y="603" >重排序：dense、keyword、query/header 匹配加权</text>
<text class="small" x="95" y="627" >输出：证据编号与引用标签</text>
