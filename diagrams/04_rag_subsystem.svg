<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="'Segoe UI','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0B1220"/><stop offset="1" stop-color="#111C2F"/></linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.22"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#94A3B8"/></marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#3B82F6"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#10B981"/></marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/></marker>
    <style>
      .title{fill:#F8FAFC;font-size:30px;font-weight:800;letter-spacing:0}
      .sub{fill:#A8B3C7;font-size:14px}
      .section{fill:#F8FAFC;font-size:16px;font-weight:800}
      .label{fill:#F8FAFC;font-size:14px;font-weight:750}
      .small{fill:#B9C5D8;font-size:12px}
      .tiny{fill:#9DAAC0;font-size:11px}
      .code{fill:#C7D2FE;font-size:11px;font-family:'Cascadia Mono','Consolas',monospace}
    </style>
  </defs>
  <rect width="1280" height="720" rx="18" fill="url(#bg)"/>
  <text class="title" x="640" y="44" text-anchor="middle">RAG 检索子系统</text>
