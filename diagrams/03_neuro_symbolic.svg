<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="'Segoe UI','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0B1220"/><stop offset="1" stop-color="#111C2F"/></linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.22"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#94A3B8"/></marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#3B82F6"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#10B981"/></marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/></marker>
    <style>
      .title{fill:#F8FAFC;font-size:30px;font-weight:800;letter-spacing:0}
      .sub{fill:#A8B3C7;font-size:14px}
      .section{fill:#F8FAFC;font-size:16px;font-weight:800}
      .label{fill:#F8FAFC;font-size:14px;font-weight:750}
      .small{fill:#B9C5D8;font-size:12px}
      .tiny{fill:#9DAAC0;font-size:11px}
      .code{fill:#C7D2FE;font-size:11px;font-family:'Cascadia Mono','Consolas',monospace}
    </style>
  </defs>
  <rect width="1280" height="720" rx="18" fill="url(#bg)"/>
  <text class="title" x="640" y="44" text-anchor="middle">Neuro-Symbolic 治理架构</text>
  <text class="sub" x="640" y="70" text-anchor="middle">LLM 负责生成与推理，符号规则负责验证、阻断与返修</text>
<rect x="70" y="102" width="530" height="560" rx="14" fill="#142238" stroke="#3B82F6" stroke-opacity="0.45" filter="url(#shadow)"/>
<rect x="70" y="102" width="5" height="560" rx="3" fill="#3B82F6"/>
<text class="section" x="88" y="131" fill="#3B82F6">Neural 神经侧</text>
<text class="small" x="88" y="153" >语义理解、推理、文本生成与工具选择</text>
<rect x="680" y="102" width="530" height="560" rx="14" fill="#102A2C" stroke="#10B981" stroke-opacity="0.45" filter="url(#shadow)"/>
<rect x="680" y="102" width="5" height="560" rx="3" fill="#10B981"/>
<text class="section" x="698" y="131" fill="#10B981">Symbolic 符号侧</text>
<text class="small" x="698" y="153" >规则验证、AST 审计、报告契约与阻断返修</text>
<rect x="130" y="166" width="410" height="52" rx="8" fill="#3B82F6" fill-opacity="0.14" stroke="#3B82F6" stroke-opacity="0.62"/>
<text class="label" x="335.0" y="189.0" text-anchor="middle">DeepSeek V4 Flash</text>
<text class="tiny" x="335.0" y="206" text-anchor="middle">主力 LLM，输出 JSON 动作</text>
<rect x="130" y="238" width="410" height="52" rx="8" fill="#3B82F6" fill-opacity="0.14" stroke="#3B82F6" stroke-opacity="0.62"/>
<text class="label" x="335.0" y="261.0" text-anchor="middle">Vision LLM</text>
<text class="tiny" x="335.0" y="278" text-anchor="middle">可配置视觉审稿</text>
<rect x="130" y="310" width="410" height="52" rx="8" fill="#3B82F6" fill-opacity="0.14" stroke="#3B82F6" stroke-opacity="0.62"/>
<text class="label" x="335.0" y="333.0" text-anchor="middle">Prompt Engineering</text>
<text class="tiny" x="335.0" y="350" text-anchor="middle">系统提示、反馈提示、审稿提示</text>
<rect x="130" y="382" width="410" height="52" rx="8" fill="#3B82F6" fill-opacity="0.14" stroke="#3B82F6" stroke-opacity="0.62"/>
<text class="label" x="335.0" y="405.0" text-anchor="middle">Knowledge Context</text>
<text class="tiny" x="335.0" y="422" text-anchor="middle">记忆、RAG 引用、用户意图</text>
<rect x="130" y="454" width="410" height="52" rx="8" fill="#3B82F6" fill-opacity="0.14" stroke="#3B82F6" stroke-opacity="0.62"/>
<text class="label" x="335.0" y="477.0" text-anchor="middle">Tools</text>
<text class="tiny" x="335.0" y="494" text-anchor="middle">PythonInterpreterTool / TavilySearchTool</text>
<rect x="130" y="526" width="410" height="52" rx="8" fill="#3B82F6" fill-opacity="0.14" stroke="#3B82F6" stroke-opacity="0.62"/>
<text class="label" x="335.0" y="549.0" text-anchor="middle">JSON 协议</text>
<text class="tiny" x="335.0" y="566" text-anchor="middle">action / tool_name / tool_input</text>
<line x1="640" y1="104" x2="640" y2="662" stroke="#94A3B8" stroke-width="2" stroke-dasharray="7 7"/>
<line x1="600" y1="270" x2="672" y2="270" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
<line x1="600" y1="384" x2="672" y2="384" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
<line x1="600" y1="498" x2="672" y2="498" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
<rect x="720" y="160" width="430" height="94" rx="10" fill="#064E3B" fill-opacity="0.34" stroke="#10B981" stroke-opacity="0.45"/>
<text class="section" x="740" y="186" fill="#34D399">执行审计规则（3 条）</text>
<text class="code" x="1010" y="186" >execution_audit.py</text>
<rect x="740" y="202" width="240" height="15" rx="8" fill="#10B981" fill-opacity="0.14" stroke="#10B981" stroke-opacity="0.62"/>
<text class="label" x="860.0" y="206.5" text-anchor="middle">Stage1 必须保存</text>
<text class="label" x="860.0" y="222.5" text-anchor="middle">cleaned_data</text>
<rect x="740" y="219" width="240" height="15" rx="8" fill="#10B981" fill-opacity="0.14" stroke="#10B981" stroke-opacity="0.62"/>
<text class="label" x="860.0" y="223.5" text-anchor="middle">Stage2 必须重读</text>
<text class="label" x="860.0" y="239.5" text-anchor="middle">cleaned_data</text>
<rect x="740" y="236" width="240" height="15" rx="8" fill="#10B981" fill-opacity="0.14" stroke="#10B981" stroke-opacity="0.62"/>
<text class="label" x="860.0" y="248.5" text-anchor="middle">禁止清洗后复用原始数据</text>
<rect x="720" y="290" width="430" height="94" rx="10" fill="#064E3B" fill-opacity="0.34" stroke="#10B981" stroke-opacity="0.45"/>
<text class="section" x="740" y="316" fill="#34D399">报告契约规则（4 条）</text>
<text class="code" x="1010" y="316" >report_contract.py</text>
<rect x="740" y="332" width="240" height="15" rx="8" fill="#10B981" fill-opacity="0.14" stroke="#10B981" stroke-opacity="0.62"/>
