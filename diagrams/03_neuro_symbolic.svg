<rect x="740" y="366" width="240" height="15" rx="8" fill="#10B981" fill-opacity="0.14" stroke="#10B981" stroke-opacity="0.62"/>
<text class="label" x="860.0" y="378.5" text-anchor="middle">统计/CI 表达要规范</text>
<rect x="740" y="383" width="240" height="15" rx="8" fill="#10B981" fill-opacity="0.14" stroke="#10B981" stroke-opacity="0.62"/>
<text class="label" x="860.0" y="395.5" text-anchor="middle">禁止因果化语言</text>
<rect x="720" y="420" width="430" height="94" rx="10" fill="#064E3B" fill-opacity="0.34" stroke="#10B981" stroke-opacity="0.45"/>
<text class="section" x="740" y="446" fill="#34D399">证据与任务对齐（2 条）</text>
<text class="code" x="1010" y="446" >reporting.py</text>
<rect x="740" y="462" width="240" height="15" rx="8" fill="#10B981" fill-opacity="0.14" stroke="#10B981" stroke-opacity="0.62"/>
<text class="label" x="860.0" y="466.5" text-anchor="middle">引用必须回到 evidence</text>
<text class="label" x="860.0" y="482.5" text-anchor="middle">register</text>
