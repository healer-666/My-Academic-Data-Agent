<rect x="880" y="604" width="130" height="28" rx="8" fill="#F59E0B" fill-opacity="0.14" stroke="#F59E0B" stroke-opacity="0.62"/>
<text class="label" x="945.0" y="615.0" text-anchor="middle">prompt_onl</text>
<text class="label" x="945.0" y="631.0" text-anchor="middle">y</text>
<rect x="1040" y="604" width="90" height="28" rx="8" fill="#EF4444" fill-opacity="0.14" stroke="#EF4444" stroke-opacity="0.62"/>
