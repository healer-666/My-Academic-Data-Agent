<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 920" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="layerGrad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="layerGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="layerGrad3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="layerGrad4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="layerGrad5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="layerGrad6" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.03"/>
    </linearGradient>
    <marker id="arrGray" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
    <marker id="arrBlue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrAmber" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B"/>
    </marker>
  </defs>

  <rect width="1400" height="920" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="700" y="48" text-anchor="middle" fill="#F8FAFC" font-size="28" font-weight="700" letter-spacing="1">Academic Data Agent — 总体架构</text>
  <text x="700" y="72" text-anchor="middle" fill="#94A3B8" font-size="13">Neuro-Symbolic LLM Agent for Reliable Statistical Data Analysis</text>

  <!-- Legend -->
  <circle cx="400" cy="905" r="5" fill="#3B82F6"/><text x="410" y="909" fill="#94A3B8" font-size="11">LLM (Neural)</text>
  <circle cx="530" cy="905" r="5" fill="#10B981"/><text x="540" y="909" fill="#94A3B8" font-size="11">Symbolic Rule</text>
  <circle cx="680" cy="905" r="5" fill="#8B5CF6"/><text x="690" y="909" fill="#94A3B8" font-size="11">Data Store</text>
  <circle cx="820" cy="905" r="5" fill="#F59E0B"/><text x="830" y="909" fill="#94A3B8" font-size="11">Tool / Executor</text>

  <!-- ═══ Layer 1: Input / DataContext ═══ -->
  <rect x="80" y="95" width="1240" height="110" rx="12" fill="url(#layerGrad1)" stroke="#3B82F6" stroke-opacity="0.25" stroke-width="1"/>
  <rect x="80" y="95" width="4" height="110" rx="2" fill="#3B82F6"/>
  <text x="100" y="124" fill="#3B82F6" font-size="14" font-weight="700">L1  输入层 / 数据上下文</text>
  <text x="100" y="144" fill="#CBD5E1" font-size="11">用户查询 + 数据文件 → 文档解析 → Schema 提取 → DataContextSummary</text>

  <g transform="translate(100, 156)">
    <rect x="0" y="0" width="170" height="32" rx="6" fill="#1E3A5F" stroke="#3B82F6" stroke-opacity="0.35"/>
    <text x="85" y="20" text-anchor="middle" fill="#93C5FD" font-size="11">main.py / Gradio Web</text>
    <rect x="200" y="0" width="150" height="32" rx="6" fill="#1E3A5F" stroke="#3B82F6" stroke-opacity="0.35"/>
    <text x="275" y="20" text-anchor="middle" fill="#93C5FD" font-size="11">document_ingestion</text>
    <rect x="380" y="0" width="150" height="32" rx="6" fill="#1E3A5F" stroke="#3B82F6" stroke-opacity="0.35"/>
    <text x="455" y="20" text-anchor="middle" fill="#93C5FD" font-size="11">data_context</text>
    <rect x="560" y="0" width="150" height="32" rx="6" fill="#1E3A5F" stroke="#3B82F6" stroke-opacity="0.35"/>
    <text x="635" y="20" text-anchor="middle" fill="#93C5FD" font-size="11">config / .env</text>
    <rect x="740" y="0" width="160" height="32" rx="6" fill="#1E3A5F" stroke="#3B82F6" stroke-opacity="0.35"/>
    <text x="820" y="20" text-anchor="middle" fill="#93C5FD" font-size="11">RuntimeConfig</text>
    <path d="M170,16 L200,16" stroke="#3B82F6" stroke-width="1.5" fill="none" marker-end="url(#arrBlue)"/>
    <path d="M350,16 L380,16" stroke="#3B82F6" stroke-width="1.5" fill="none" marker-end="url(#arrBlue)"/>
    <path d="M530,16 L560,16" stroke="#3B82F6" stroke-width="1.5" fill="none" marker-end="url(#arrBlue)"/>
    <path d="M710,16 L740,16" stroke="#3B82F6" stroke-width="1.5" fill="none" marker-end="url(#arrBlue)"/>
  </g>

  <!-- ═══ Layer 2: Retrieval / Memory ═══ -->
  <rect x="80" y="225" width="1240" height="110" rx="12" fill="url(#layerGrad2)" stroke="#8B5CF6" stroke-opacity="0.25" stroke-width="1"/>
  <rect x="80" y="225" width="4" height="110" rx="2" fill="#8B5CF6"/>
  <text x="100" y="253" fill="#8B5CF6" font-size="14" font-weight="700">L2  检索层 / 记忆系统</text>
  <text x="100" y="273" fill="#CBD5E1" font-size="11">外部知识检索 (RAG) + 成功/失败经验记忆 (Memory) → 上下文组装</text>

  <g transform="translate(100, 285)">
    <rect x="0" y="0" width="200" height="32" rx="6" fill="#2D1B69" stroke="#8B5CF6" stroke-opacity="0.35"/>
    <text x="100" y="20" text-anchor="middle" fill="#C4B5FD" font-size="11">RAG Service (ChromaDB + 关键词)</text>
    <rect x="230" y="0" width="180" height="32" rx="6" fill="#2D1B69" stroke="#8B5CF6" stroke-opacity="0.35"/>
    <text x="320" y="20" text-anchor="middle" fill="#C4B5FD" font-size="11">Success / Failure Memory</text>
    <rect x="440" y="0" width="180" height="32" rx="6" fill="#2D1B69" stroke="#8B5CF6" stroke-opacity="0.35"/>
    <text x="530" y="20" text-anchor="middle" fill="#C4B5FD" font-size="11">KnowledgeContextProvider</text>
    <rect x="650" y="0" width="170" height="32" rx="6" fill="#2D1B69" stroke="#8B5CF6" stroke-opacity="0.35"/>
    <text x="735" y="20" text-anchor="middle" fill="#C4B5FD" font-size="11">Evidence Register</text>
    <path d="M200,16 L230,16" stroke="#8B5CF6" stroke-width="1.5" fill="none" marker-end="url(#arrGray)"/>
    <path d="M410,16 L440,16" stroke="#8B5CF6" stroke-width="1.5" fill="none" marker-end="url(#arrGray)"/>
    <path d="M620,16 L650,16" stroke="#8B5CF6" stroke-width="1.5" fill="none" marker-end="url(#arrGray)"/>
  </g>

  <!-- ═══ Layer 3: Analysis Execution ═══ -->
  <rect x="80" y="355" width="1240" height="135" rx="12" fill="url(#layerGrad3)" stroke="#F59E0B" stroke-opacity="0.25" stroke-width="1"/>
  <rect x="80" y="355" width="4" height="135" rx="2" fill="#F59E0B"/>
  <text x="100" y="383" fill="#F59E0B" font-size="14" font-weight="700">L3  分析执行层</text>
  <text x="100" y="403" fill="#CBD5E1" font-size="11">ReAct 循环: LLM 推理 → 工具调用 (Python沙箱 / 网络搜索) → 观察反馈</text>

  <g transform="translate(100, 415)">
    <rect x="0" y="0" width="130" height="55" rx="8" fill="#422006" stroke="#F59E0B" stroke-opacity="0.45"/>
    <text x="65" y="22" text-anchor="middle" fill="#FCD34D" font-size="11" font-weight="600">LLM 推理</text>
    <text x="65" y="38" text-anchor="middle" fill="#D97706" font-size="9">DeepSeek V4 Flash</text>
    <rect x="170" y="0" width="130" height="55" rx="8" fill="#422006" stroke="#F59E0B" stroke-opacity="0.45"/>
    <text x="235" y="22" text-anchor="middle" fill="#FCD34D" font-size="11" font-weight="600">JSON 协议</text>
    <text x="235" y="38" text-anchor="middle" fill="#D97706" font-size="9">action / tool / input</text>
    <rect x="340" y="0" width="160" height="55" rx="8" fill="#422006" stroke="#F59E0B" stroke-opacity="0.45"/>
    <text x="420" y="22" text-anchor="middle" fill="#FCD34D" font-size="11" font-weight="600">PythonInterpreterTool</text>
    <text x="420" y="38" text-anchor="middle" fill="#D97706" font-size="9">exec() 沙箱 + 预加载库</text>
    <rect x="540" y="0" width="140" height="55" rx="8" fill="#422006" stroke="#F59E0B" stroke-opacity="0.45"/>
    <text x="610" y="22" text-anchor="middle" fill="#FCD34D" font-size="11" font-weight="600">TavilySearchTool</text>
    <text x="610" y="38" text-anchor="middle" fill="#D97706" font-size="9">领域知识搜索</text>
    <rect x="720" y="0" width="130" height="55" rx="8" fill="#422006" stroke="#F59E0B" stroke-opacity="0.45"/>
    <text x="785" y="22" text-anchor="middle" fill="#FCD34D" font-size="11" font-weight="600">prompts.py</text>
    <text x="785" y="38" text-anchor="middle" fill="#D97706" font-size="9">系统提示词构建</text>
    <path d="M130,27 L170,27" stroke="#F59E0B" stroke-width="1.5" fill="none" marker-end="url(#arrAmber)"/>
    <path d="M300,27 L340,27" stroke="#F59E0B" stroke-width="1.5" fill="none" marker-end="url(#arrAmber)"/>
    <path d="M500,27 L540,27" stroke="#F59E0B" stroke-width="1.5" fill="none" marker-end="url(#arrAmber)"/>
    <path d="M680,27 L720,27" stroke="#F59E0B" stroke-width="1.5" fill="none" marker-end="url(#arrAmber)"/>
    <path d="M785,65 C785,85 130,85 130,65" stroke="#F59E0B" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrAmber)"/>
    <text x="458" y="82" text-anchor="middle" fill="#D97706" font-size="10">ReAct 循环 (最多 6 步)</text>
  </g>

  <!-- ═══ Layer 4: Governance / Audit ═══ -->
  <rect x="80" y="510" width="1240" height="110" rx="12" fill="url(#layerGrad4)" stroke="#10B981" stroke-opacity="0.25" stroke-width="1"/>
  <rect x="80" y="510" width="4" height="110" rx="2" fill="#10B981"/>
  <text x="100" y="538" fill="#10B981" font-size="14" font-weight="700">L4  治理层 / 审计</text>
  <text x="100" y="558" fill="#CBD5E1" font-size="11">符号规则验证: AST 执行审计 + 报告契约检查 + 独立审稿人循环</text>

  <g transform="translate(100, 570)">
    <rect x="0" y="0" width="200" height="32" rx="6" fill="#064E3B" stroke="#10B981" stroke-opacity="0.35"/>
    <text x="100" y="20" text-anchor="middle" fill="#6EE7B7" font-size="11">execution_audit (AST审计)</text>
    <rect x="230" y="0" width="200" height="32" rx="6" fill="#064E3B" stroke="#10B981" stroke-opacity="0.35"/>
    <text x="330" y="20" text-anchor="middle" fill="#6EE7B7" font-size="11">report_contract (7节检查)</text>
    <rect x="460" y="0" width="180" height="32" rx="6" fill="#064E3B" stroke="#10B981" stroke-opacity="0.35"/>
    <text x="550" y="20" text-anchor="middle" fill="#6EE7B7" font-size="11">symbolic_rules (9条规则)</text>
    <rect x="670" y="0" width="180" height="32" rx="6" fill="#064E3B" stroke="#10B981" stroke-opacity="0.35"/>
    <text x="760" y="20" text-anchor="middle" fill="#6EE7B7" font-size="11">review_service (审稿循环)</text>
    <rect x="880" y="0" width="160" height="32" rx="6" fill="#064E3B" stroke="#10B981" stroke-opacity="0.35"/>
    <text x="960" y="20" text-anchor="middle" fill="#6EE7B7" font-size="11">vision_review (视觉审稿)</text>
    <path d="M200,16 L230,16" stroke="#10B981" stroke-width="1.5" fill="none" marker-end="url(#arrGray)"/>
    <path d="M430,16 L460,16" stroke="#10B981" stroke-width="1.5" fill="none" marker-end="url(#arrGray)"/>
    <path d="M640,16 L670,16" stroke="#10B981" stroke-width="1.5" fill="none" marker-end="url(#arrGray)"/>
    <path d="M850,16 L880,16" stroke="#10B981" stroke-width="1.5" fill="none" marker-end="url(#arrGray)"/>
  </g>

  <!-- ═══ Layer 5: Harness / Regression ═══ -->
  <rect x="80" y="640" width="1240" height="110" rx="12" fill="url(#layerGrad5)" stroke="#EF4444" stroke-opacity="0.25" stroke-width="1"/>
  <rect x="80" y="640" width="4" height="110" rx="2" fill="#EF4444"/>
  <text x="100" y="668" fill="#EF4444" font-size="14" font-weight="700">L5  评测层 / 回归检测</text>
  <text x="100" y="688" fill="#CBD5E1" font-size="11">10 任务评测 → 基线对比 → 回归检测 → 符号消融实验 → 失败分类学</text>

  <g transform="translate(100, 700)">
    <rect x="0" y="0" width="170" height="32" rx="6" fill="#450A0A" stroke="#EF4444" stroke-opacity="0.35"/>
    <text x="85" y="20" text-anchor="middle" fill="#FCA5A5" font-size="11">eval/run_eval (10任务)</text>
    <rect x="200" y="0" width="170" height="32" rx="6" fill="#450A0A" stroke="#EF4444" stroke-opacity="0.35"/>
    <text x="285" y="20" text-anchor="middle" fill="#FCA5A5" font-size="11">compare_baseline</text>
    <rect x="400" y="0" width="180" height="32" rx="6" fill="#450A0A" stroke="#EF4444" stroke-opacity="0.35"/>
    <text x="490" y="20" text-anchor="middle" fill="#FCA5A5" font-size="11">symbolic_ablation</text>
    <rect x="610" y="0" width="170" height="32" rx="6" fill="#450A0A" stroke="#EF4444" stroke-opacity="0.35"/>
    <text x="695" y="20" text-anchor="middle" fill="#FCA5A5" font-size="11">failure_taxonomy</text>
    <rect x="810" y="0" width="190" height="32" rx="6" fill="#450A0A" stroke="#EF4444" stroke-opacity="0.35"/>
    <text x="905" y="20" text-anchor="middle" fill="#FCA5A5" font-size="11">regression_rules (阈值检测)</text>
    <path d="M170,16 L200,16" stroke="#EF4444" stroke-width="1.5" fill="none" marker-end="url(#arrGray)"/>
    <path d="M370,16 L400,16" stroke="#EF4444" stroke-width="1.5" fill="none" marker-end="url(#arrGray)"/>
    <path d="M580,16 L610,16" stroke="#EF4444" stroke-width="1.5" fill="none" marker-end="url(#arrGray)"/>
    <path d="M780,16 L810,16" stroke="#EF4444" stroke-width="1.5" fill="none" marker-end="url(#arrGray)"/>
  </g>

  <!-- ═══ Layer 6: Presentation / QA ═══ -->
  <rect x="80" y="770" width="1240" height="110" rx="12" fill="url(#layerGrad6)" stroke="#06B6D4" stroke-opacity="0.25" stroke-width="1"/>
  <rect x="80" y="770" width="4" height="110" rx="2" fill="#06B6D4"/>
  <text x="100" y="798" fill="#06B6D4" font-size="14" font-weight="700">L6  展示层 / 历史问答</text>
  <text x="100" y="818" fill="#CBD5E1" font-size="11">Web 工作台 (Gradio) + 终端 CLI + Notebook 渲染 + 历史问答 (History QA)</text>

  <g transform="translate(100, 830)">
    <rect x="0" y="0" width="180" height="32" rx="6" fill="#164E63" stroke="#06B6D4" stroke-opacity="0.35"/>
    <text x="90" y="20" text-anchor="middle" fill="#67E8F9" font-size="11">Gradio Web 工作台</text>
    <rect x="210" y="0" width="140" height="32" rx="6" fill="#164E63" stroke="#06B6D4" stroke-opacity="0.35"/>
    <text x="280" y="20" text-anchor="middle" fill="#67E8F9" font-size="11">CLI (Rich终端)</text>
    <rect x="380" y="0" width="170" height="32" rx="6" fill="#164E63" stroke="#06B6D4" stroke-opacity="0.35"/>
    <text x="465" y="20" text-anchor="middle" fill="#67E8F9" font-size="11">history_qa (历史问答)</text>
    <rect x="580" y="0" width="150" height="32" rx="6" fill="#164E63" stroke="#06B6D4" stroke-opacity="0.35"/>
    <text x="655" y="20" text-anchor="middle" fill="#67E8F9" font-size="11">presentation 渲染</text>
    <rect x="760" y="0" width="160" height="32" rx="6" fill="#164E63" stroke="#06B6D4" stroke-opacity="0.35"/>
    <text x="840" y="20" text-anchor="middle" fill="#67E8F9" font-size="11">artifact_service</text>
    <path d="M180,16 L210,16" stroke="#06B6D4" stroke-width="1.5" fill="none" marker-end="url(#arrGray)"/>
    <path d="M350,16 L380,16" stroke="#06B6D4" stroke-width="1.5" fill="none" marker-end="url(#arrGray)"/>
    <path d="M550,16 L580,16" stroke="#06B6D4" stroke-width="1.5" fill="none" marker-end="url(#arrGray)"/>
    <path d="M730,16 L760,16" stroke="#06B6D4" stroke-width="1.5" fill="none" marker-end="url(#arrGray)"/>
  </g>

  <!-- Central orchestrator indicator -->
  <rect x="1130" y="385" width="180" height="60" rx="10" fill="#F8FAFC" fill-opacity="0.06" stroke="#F8FAFC" stroke-opacity="0.15" stroke-dasharray="4,3"/>
  <text x="1220" y="410" text-anchor="middle" fill="#F8FAFC" font-size="11" font-weight="600">核心编排器</text>
  <text x="1220" y="430" text-anchor="middle" fill="#94A3B8" font-size="10">agent_runner.py</text>

  <!-- Vertical flow arrows between layers -->
  <line x1="700" y1="205" x2="700" y2="225" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="700" y1="335" x2="700" y2="355" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="700" y1="490" x2="700" y2="510" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="700" y1="620" x2="700" y2="640" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="700" y1="750" x2="700" y2="770" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
