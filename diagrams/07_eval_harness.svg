<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <marker id="arrGray" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="700" y="48" text-anchor="middle" fill="#F8FAFC" font-size="28" font-weight="700">评测框架与消融实验</text>
  <text x="700" y="72" text-anchor="middle" fill="#94A3B8" font-size="13">10 任务基线评测 → 回归检测 → 符号消融 → 失败分类学</text>

  <!-- ═══ Task Matrix ═══ -->
  <rect x="60" y="95" width="820" height="380" rx="12" fill="#1E293B" fill-opacity="0.5" stroke="#334155"/>
  <text x="80" y="123" fill="#F8FAFC" font-size="15" font-weight="700">10 个评测任务 (eval/tasks/*.yaml)</text>

  <!-- Task table header -->
  <rect x="80" y="135" width="780" height="28" rx="4" fill="#334155"/>
  <text x="100" y="154" fill="#94A3B8" font-size="10" font-weight="600">任务</text>
  <text x="340" y="154" fill="#94A3B8" font-size="10" font-weight="600">场景</text>
  <text x="530" y="154" fill="#94A3B8" font-size="10" font-weight="600">特殊</text>
  <text x="650" y="154" fill="#94A3B8" font-size="10" font-weight="600">常见失败分类</text>

  <!-- Task rows -->
  <rect x="80" y="166" width="780" height="24" rx="3" fill="#1E293B"/>
  <text x="100" y="183" fill="#CBD5E1" font-size="10">before_after_paired_measure</text>
  <text x="340" y="183" fill="#94A3B8" font-size="10">配对前后生物标志物</text>
  <text x="530" y="183" fill="#64748B" font-size="10">—</text>
  <text x="650" y="183" fill="#F87171" font-size="10">review_rejection</text>

  <rect x="80" y="193" width="780" height="24" rx="3" fill="#1E293B" fill-opacity="0.5"/>
  <text x="100" y="210" fill="#CBD5E1" font-size="10">two_group_small_sample</text>
  <text x="340" y="210" fill="#94A3B8" font-size="10">小样本组间比较</text>
  <text x="530" y="210" fill="#64748B" font-size="10">—</text>
  <text x="650" y="210" fill="#F87171" font-size="10">review_rejection</text>

  <rect x="80" y="220" width="780" height="24" rx="3" fill="#1E293B"/>
  <text x="100" y="237" fill="#CBD5E1" font-size="10">multi_group_with_variance_shift</text>
  <text x="340" y="237" fill="#94A3B8" font-size="10">3组剂量对比</text>
  <text x="530" y="237" fill="#64748B" font-size="10">—</text>
  <text x="650" y="237" fill="#F87171" font-size="10">figure_interpretation_failure</text>

  <rect x="80" y="247" width="780" height="24" rx="3" fill="#1E293B" fill-opacity="0.5"/>
  <text x="100" y="264" fill="#CBD5E1" font-size="10">missing_values_by_group</text>
  <text x="340" y="264" fill="#94A3B8" font-size="10">分组缺失值分析</text>
  <text x="530" y="264" fill="#64748B" font-size="10">—</text>
  <text x="650" y="264" fill="#F87171" font-size="10">cleaning_contract_failure</text>

  <rect x="80" y="274" width="780" height="24" rx="3" fill="#1E293B"/>
  <text x="100" y="291" fill="#CBD5E1" font-size="10">time_series_trend_clean</text>
  <text x="340" y="291" fill="#94A3B8" font-size="10">时间序列趋势</text>
  <text x="530" y="291" fill="#64748B" font-size="10">—</text>
  <text x="650" y="291" fill="#F87171" font-size="10">figure_interpretation_failure</text>

  <rect x="80" y="301" width="780" height="24" rx="3" fill="#1E293B" fill-opacity="0.5"/>
  <text x="100" y="318" fill="#CBD5E1" font-size="10">outlier_sensitive_measurement</text>
  <text x="340" y="318" fill="#94A3B8" font-size="10">异常值检测</text>
  <text x="530" y="318" fill="#64748B" font-size="10">—</text>
  <text x="650" y="318" fill="#F87171" font-size="10">figure_interpretation_failure</text>

  <rect x="80" y="328" width="780" height="24" rx="3" fill="#1E293B"/>
  <text x="100" y="345" fill="#CBD5E1" font-size="10">mixed_units_and_dirty_headers</text>
  <text x="340" y="345" fill="#94A3B8" font-size="10">脏数据/混合单位</text>
  <text x="530" y="345" fill="#64748B" font-size="10">—</text>
  <text x="650" y="345" fill="#F87171" font-size="10">cleaning_contract_failure</text>

  <rect x="80" y="355" width="780" height="24" rx="3" fill="#1E293B" fill-opacity="0.5"/>
  <text x="100" y="372" fill="#CBD5E1" font-size="10">correlation_without_causality</text>
  <text x="340" y="372" fill="#94A3B8" font-size="10">相关性分析</text>
  <text x="530" y="372" fill="#64748B" font-size="10">—</text>
  <text x="650" y="372" fill="#F87171" font-size="10">review_rejection</text>

  <rect x="80" y="382" width="780" height="24" rx="3" fill="#1E293B"/>
  <text x="100" y="399" fill="#CBD5E1" font-size="10">reference_guideline_lookup</text>
  <text x="340" y="399" fill="#94A3B8" font-size="10">RAG 引导解读</text>
  <text x="530" y="399" fill="#10B981" font-size="10">RAG</text>
  <text x="650" y="399" fill="#F87171" font-size="10">citation_evidence_failure</text>

  <rect x="80" y="409" width="780" height="24" rx="3" fill="#1E293B" fill-opacity="0.5"/>
  <text x="100" y="426" fill="#CBD5E1" font-size="10">memory_constrained_repeat_task</text>
  <text x="340" y="426" fill="#94A3B8" font-size="10">记忆约束重复</text>
  <text x="530" y="426" fill="#8B5CF6" font-size="10">Memory</text>
  <text x="650" y="426" fill="#F87171" font-size="10">review_rejection</text>

  <!-- 6 Key Checks -->
  <rect x="80" y="440" width="780" height="22" rx="3" fill="#F59E0B" fill-opacity="0.1"/>
  <text x="100" y="456" fill="#FCD34D" font-size="10" font-weight="600">全部任务共享 6 项 key_checks: workflow_complete · cleaned_data · execution_audit · report · trace · charts</text>

  <!-- ═══ Eval Pipeline ═══ -->
  <rect x="910" y="95" width="430" height="380" rx="12" fill="#450A0A" fill-opacity="0.15" stroke="#EF4444" stroke-opacity="0.3"/>
  <text x="1125" y="123" text-anchor="middle" fill="#EF4444" font-size="15" font-weight="700">评测流程</text>

  <rect x="935" y="140" width="380" height="35" rx="6" fill="#450A0A" fill-opacity="0.3" stroke="#EF4444" stroke-opacity="0.2"/>
  <text x="1125" y="163" text-anchor="middle" fill="#FCA5A5" font-size="11">run_eval.py — 按固定顺序运行 10 个任务</text>

  <rect x="935" y="185" width="380" height="35" rx="6" fill="#450A0A" fill-opacity="0.3" stroke="#EF4444" stroke-opacity="0.2"/>
  <text x="1125" y="208" text-anchor="middle" fill="#FCA5A5" font-size="11">per-task summary → aggregate eval run report</text>

  <rect x="935" y="230" width="380" height="35" rx="6" fill="#064E3B" fill-opacity="0.3" stroke="#10B981" stroke-opacity="0.2"/>
  <text x="1125" y="253" text-anchor="middle" fill="#6EE7B7" font-size="11">baseline snapshot: seed_v5 (10/10 accepted)</text>

  <rect x="935" y="275" width="380" height="35" rx="6" fill="#450A0A" fill-opacity="0.3" stroke="#EF4444" stroke-opacity="0.2"/>
  <text x="1125" y="298" text-anchor="middle" fill="#FCA5A5" font-size="11">compare_baseline.py — 回归检测</text>

  <rect x="935" y="320" width="380" height="55" rx="6" fill="#450A0A" fill-opacity="0.2" stroke="#EF4444" stroke-opacity="0.15"/>
  <text x="1125" y="343" text-anchor="middle" fill="#F87171" font-size="10">回归阈值 (regression_rules.json)</text>
  <text x="1125" y="358" text-anchor="middle" fill="#94A3B8" font-size="10">accept_rate ≤ -5% · workflow ≤ -5%</text>
  <text x="1125" y="373" text-anchor="middle" fill="#94A3B8" font-size="10">audit_pass ≤ -1% · steps ≤ +2.0</text>

  <!-- Pipeline flow arrows -->
  <path d="M1125,175 L1125,185" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrGray)"/>
  <path d="M1125,220 L1125,230" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrGray)"/>
  <path d="M1125,265 L1125,275" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrGray)"/>
  <path d="M1125,310 L1125,320" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrGray)"/>

  <!-- Failure Taxonomy -->
  <rect x="935" y="390" width="380" height="75" rx="8" fill="#F59E0B" fill-opacity="0.1" stroke="#F59E0B" stroke-opacity="0.2"/>
  <text x="1125" y="413" text-anchor="middle" fill="#FCD34D" font-size="11" font-weight="600">失败分类学 (failure_taxonomy)</text>
  <text x="1125" y="430" text-anchor="middle" fill="#D97706" font-size="10">cleaning_contract_failure · artifact_contract_failure</text>
  <text x="1125" y="445" text-anchor="middle" fill="#D97706" font-size="10">report_structure · figure_interpretation · review_rejection</text>

  <!-- ═══ Symbolic Ablation ═══ -->
  <rect x="60" y="500" width="1280" height="190" rx="12" fill="#2D1B69" fill-opacity="0.15" stroke="#8B5CF6" stroke-opacity="0.3"/>
  <text x="80" y="528" fill="#8B5CF6" font-size="16" font-weight="700">符号消融实验 (Symbolic Ablation)</text>

  <!-- Three profiles -->
  <rect x="85" y="545" width="370" height="125" rx="10" fill="#064E3B" fill-opacity="0.3" stroke="#10B981" stroke-opacity="0.4"/>
  <text x="270" y="570" text-anchor="middle" fill="#6EE7B7" font-size="14" font-weight="700">full</text>
  <text x="270" y="592" text-anchor="middle" fill="#A7F3D0" font-size="11">prompt 注入 + checker 运行 + blocking 阻断</text>
  <text x="270" y="612" text-anchor="middle" fill="#94A3B8" font-size="10">9 条规则全部生效</text>
  <text x="270" y="632" text-anchor="middle" fill="#94A3B8" font-size="10">基线: seed_v5 (10/10 accepted)</text>
  <text x="270" y="652" text-anchor="middle" fill="#94A3B8" font-size="10">最强约束, 最高可靠性</text>

  <rect x="485" y="545" width="370" height="125" rx="10" fill="#422006" fill-opacity="0.3" stroke="#F59E0B" stroke-opacity="0.4"/>
  <text x="670" y="570" text-anchor="middle" fill="#FCD34D" font-size="14" font-weight="700">prompt_only</text>
  <text x="670" y="592" text-anchor="middle" fill="#FDE68A" font-size="11">仅 prompt 注入 (软约束)</text>
  <text x="670" y="612" text-anchor="middle" fill="#94A3B8" font-size="10">规则文本写入提示词, 无 checker</text>
  <text x="670" y="632" text-anchor="middle" fill="#94A3B8" font-size="10">依赖 LLM 自觉遵守规则</text>
  <text x="670" y="652" text-anchor="middle" fill="#94A3B8" font-size="10">测试 "prompt alone" 是否足够</text>

  <rect x="885" y="545" width="430" height="125" rx="10" fill="#450A0A" fill-opacity="0.3" stroke="#EF4444" stroke-opacity="0.4"/>
  <text x="1100" y="570" text-anchor="middle" fill="#FCA5A5" font-size="14" font-weight="700">none</text>
  <text x="1100" y="592" text-anchor="middle" fill="#FECACA" font-size="11">仅 JSON/工具协议, 无符号规则</text>
  <text x="1100" y="612" text-anchor="middle" fill="#94A3B8" font-size="10">最小系统提示词 (_build_minimal_system_prompt)</text>
  <text x="1100" y="632" text-anchor="middle" fill="#94A3B8" font-size="10">纯 LLM 自由发挥</text>
  <text x="1100" y="652" text-anchor="middle" fill="#94A3B8" font-size="10">对照组: 量化符号规则的增量贡献</text>

  <!-- ═══ Ablation Analysis ═══ -->
  <rect x="60" y="715" width="1280" height="160" rx="12" fill="#1E293B" fill-opacity="0.5" stroke="#334155"/>
  <text x="80" y="743" fill="#F8FAFC" font-size="15" font-weight="700">消融分析流程</text>

  <rect x="85" y="758" width="200" height="40" rx="6" fill="#334155"/>
  <text x="185" y="783" text-anchor="middle" fill="#CBD5E1" font-size="11">run_symbolic_ablation.py</text>

  <rect x="320" y="758" width="200" height="40" rx="6" fill="#334155"/>
  <text x="420" y="783" text-anchor="middle" fill="#CBD5E1" font-size="11">任务 × 配置 矩阵遍历</text>

  <rect x="555" y="758" width="200" height="40" rx="6" fill="#334155"/>
  <text x="655" y="783" text-anchor="middle" fill="#CBD5E1" font-size="11">build_paired_comparisons()</text>

  <rect x="790" y="758" width="200" height="40" rx="6" fill="#334155"/>
  <text x="890" y="783" text-anchor="middle" fill="#CBD5E1" font-size="11">determine_evidence_level()</text>

  <rect x="1025" y="758" width="250" height="40" rx="6" fill="#064E3B" stroke="#10B981" stroke-opacity="0.3"/>
  <text x="1150" y="783" text-anchor="middle" fill="#6EE7B7" font-size="11">消融报告 (Markdown + JSON)</text>

  <!-- Ablation flow arrows -->
  <path d="M285,778 L320,778" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrGray)"/>
  <path d="M520,778 L555,778" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrGray)"/>
  <path d="M755,778 L790,778" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrGray)"/>
  <path d="M990,778 L1025,778" stroke="#10B981" stroke-width="1" marker-end="url(#arrGreen)"/>

  <!-- Evidence levels -->
  <text x="80" y="830" fill="#F8FAFC" font-size="13" font-weight="600">证据等级判定:</text>
  <rect x="250" y="815" width="100" height="28" rx="5" fill="#10B981" fill-opacity="0.2" stroke="#10B981" stroke-opacity="0.3"/>
  <text x="300" y="834" text-anchor="middle" fill="#6EE7B7" font-size="11">strong</text>

  <rect x="370" y="815" width="100" height="28" rx="5" fill="#F59E0B" fill-opacity="0.2" stroke="#F59E0B" stroke-opacity="0.3"/>
  <text x="420" y="834" text-anchor="middle" fill="#FCD34D" font-size="11">partial</text>

  <rect x="490" y="815" width="100" height="28" rx="5" fill="#EF4444" fill-opacity="0.2" stroke="#EF4444" stroke-opacity="0.3"/>
  <text x="540" y="834" text-anchor="middle" fill="#FCA5A5" font-size="11">weak</text>

  <text x="80" y="865" fill="#94A3B8" font-size="11">full vs prompt_only: 通过率差异 → 符号 checker 的增量贡献</text>
  <text x="80" y="885" fill="#94A3B8" font-size="11">full vs none: 通过率差异 → 整套符号治理的增量贡献</text>
</svg>
