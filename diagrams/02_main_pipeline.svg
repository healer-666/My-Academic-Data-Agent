<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 960" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <marker id="arrGray" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EF4444"/>
    </marker>
    <marker id="arrAmber" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B"/>
    </marker>
    <marker id="arrCyan" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06B6D4"/>
    </marker>
  </defs>

  <rect width="1400" height="960" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="700" y="48" text-anchor="middle" fill="#F8FAFC" font-size="28" font-weight="700" letter-spacing="1">主执行流水线 — 10 阶段详细流程</text>
  <text x="700" y="72" text-anchor="middle" fill="#94A3B8" font-size="13">run_analysis() 完整编排流程</text>

  <!-- Main vertical pipeline line -->
  <line x1="350" y1="105" x2="350" y2="920" stroke="#334155" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- ═══ Stage 1: Config ═══ -->
  <circle cx="350" cy="125" r="18" fill="#3B82F6"/>
  <text x="350" y="130" text-anchor="middle" fill="white" font-size="13" font-weight="700">1</text>
  <text x="385" y="123" fill="#F8FAFC" font-size="14" font-weight="600">配置加载</text>
  <text x="385" y="141" fill="#94A3B8" font-size="11">load_runtime_config() · 解析 .env · 质量/延迟/符号模式</text>
  <rect x="750" y="110" width="280" height="30" rx="6" fill="#1E3A5F" fill-opacity="0.4" stroke="#3B82F6" stroke-opacity="0.25"/>
  <text x="890" y="130" text-anchor="middle" fill="#93C5FD" font-size="11">config.py · model_registry.py</text>
  <line x1="350" y1="145" x2="350" y2="170" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrGray)"/>

  <!-- ═══ Stage 2: Data Context ═══ -->
  <circle cx="350" cy="190" r="18" fill="#3B82F6"/>
  <text x="350" y="195" text-anchor="middle" fill="white" font-size="13" font-weight="700">2</text>
  <text x="385" y="188" fill="#F8FAFC" font-size="14" font-weight="600">数据上下文</text>
  <text x="385" y="206" fill="#94A3B8" font-size="11">ingest_input_document() → build_data_context() · 表格 Schema 提取</text>
  <rect x="750" y="175" width="280" height="30" rx="6" fill="#1E3A5F" fill-opacity="0.4" stroke="#3B82F6" stroke-opacity="0.25"/>
  <text x="890" y="195" text-anchor="middle" fill="#93C5FD" font-size="11">document_ingestion.py · data_context.py</text>
  <line x1="350" y1="210" x2="350" y2="235" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrGray)"/>

  <!-- ═══ Stage 3: Memory ═══ -->
  <circle cx="350" cy="255" r="18" fill="#8B5CF6"/>
  <text x="350" y="260" text-anchor="middle" fill="white" font-size="13" font-weight="700">3</text>
  <text x="385" y="253" fill="#F8FAFC" font-size="14" font-weight="600">记忆检索</text>
  <text x="385" y="271" fill="#94A3B8" font-size="11">SuccessMemory + FailureMemory · ChromaDB 向量检索</text>
  <rect x="750" y="240" width="280" height="30" rx="6" fill="#2D1B69" fill-opacity="0.4" stroke="#8B5CF6" stroke-opacity="0.25"/>
  <text x="890" y="260" text-anchor="middle" fill="#C4B5FD" font-size="11">memory/service.py · memory/extractor.py</text>
  <line x1="350" y1="275" x2="350" y2="300" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrGray)"/>

  <!-- ═══ Stage 4: RAG ═══ -->
  <circle cx="350" cy="320" r="18" fill="#8B5CF6"/>
  <text x="350" y="325" text-anchor="middle" fill="white" font-size="13" font-weight="700">4</text>
  <text x="385" y="318" fill="#F8FAFC" font-size="14" font-weight="600">RAG 检索</text>
  <text x="385" y="336" fill="#94A3B8" font-size="11">文件索引 → 混合检索 (dense + keyword) → 重排序 → 证据寄存</text>
  <rect x="750" y="305" width="280" height="30" rx="6" fill="#2D1B69" fill-opacity="0.4" stroke="#8B5CF6" stroke-opacity="0.25"/>
  <text x="890" y="325" text-anchor="middle" fill="#C4B5FD" font-size="11">rag/service.py · query_builder · reranker</text>
  <line x1="350" y1="340" x2="350" y2="365" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrGray)"/>

  <!-- ═══ Stage 5: Knowledge Assembly ═══ -->
  <circle cx="350" cy="385" r="18" fill="#8B5CF6"/>
  <text x="350" y="390" text-anchor="middle" fill="white" font-size="13" font-weight="700">5</text>
  <text x="385" y="383" fill="#F8FAFC" font-size="14" font-weight="600">知识上下文组装</text>
  <text x="385" y="401" fill="#94A3B8" font-size="11">KnowledgeContextProvider.collect() · 用户意图 + 记忆 + 引用</text>
  <rect x="750" y="370" width="280" height="30" rx="6" fill="#2D1B69" fill-opacity="0.4" stroke="#8B5CF6" stroke-opacity="0.25"/>
  <text x="890" y="390" text-anchor="middle" fill="#C4B5FD" font-size="11">knowledge_context.py</text>
  <line x1="350" y1="405" x2="350" y2="428" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrGray)"/>

  <!-- ═══ ReAct Loop Box ═══ -->
  <rect x="180" y="430" width="500" height="155" rx="12" fill="#422006" fill-opacity="0.25" stroke="#F59E0B" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="430" y="455" text-anchor="middle" fill="#F59E0B" font-size="13" font-weight="700">Stage 6 — ReAct 分析循环 (循环体)</text>

  <circle cx="350" cy="482" r="14" fill="#F59E0B"/>
  <text x="350" y="486" text-anchor="middle" fill="white" font-size="11" font-weight="700">6a</text>
  <text x="380" y="480" fill="#F8FAFC" font-size="12" font-weight="600">LLM 推理生成 JSON</text>
  <text x="380" y="496" fill="#D97706" font-size="10">{action, tool_name, tool_input}</text>

  <circle cx="350" cy="518" r="14" fill="#F59E0B"/>
  <text x="350" y="522" text-anchor="middle" fill="white" font-size="11" font-weight="700">6b</text>
  <text x="380" y="516" fill="#F8FAFC" font-size="12" font-weight="600">工具执行</text>
  <text x="380" y="532" fill="#D97706" font-size="10">PythonInterpreterTool / TavilySearchTool</text>

  <circle cx="350" cy="555" r="14" fill="#F59E0B"/>
  <text x="350" y="559" text-anchor="middle" fill="white" font-size="11" font-weight="700">6c</text>
  <text x="380" y="553" fill="#F8FAFC" font-size="12" font-weight="600">观察反馈</text>
  <text x="380" y="569" fill="#D97706" font-size="10">ToolResponse → build_observation_prompt()</text>

  <!-- ReAct loop arrow -->
  <path d="M580,520 C640,520 640,480 580,480" stroke="#F59E0B" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrAmber)"/>
  <text x="655" y="505" fill="#D97706" font-size="10">循环 (max 6步)</text>

  <!-- Finish condition -->
  <rect x="750" y="455" width="280" height="110" rx="8" fill="#F59E0B" fill-opacity="0.06" stroke="#F59E0B" stroke-opacity="0.15"/>
  <text x="890" y="480" text-anchor="middle" fill="#FCD34D" font-size="12" font-weight="600">finish → 解析输出</text>
  <text x="890" y="500" text-anchor="middle" fill="#D97706" font-size="10">extract_report_and_telemetry()</text>
  <text x="890" y="517" text-anchor="middle" fill="#D97706" font-size="10">analyze_evidence_coverage()</text>
  <text x="890" y="534" text-anchor="middle" fill="#D97706" font-size="10">save_agent_trace()</text>
  <line x1="680" y1="520" x2="750" y2="510" stroke="#F59E0B" stroke-width="1" marker-end="url(#arrAmber)"/>
  <line x1="350" y1="585" x2="350" y2="610" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrGray)"/>

  <!-- ═══ Stage 7: Execution Audit ═══ -->
  <circle cx="350" cy="630" r="18" fill="#10B981"/>
  <text x="350" y="635" text-anchor="middle" fill="white" font-size="13" font-weight="700">7</text>
  <text x="385" y="628" fill="#F8FAFC" font-size="14" font-weight="600">执行审计 (AST)</text>
  <text x="385" y="646" fill="#94A3B8" font-size="11">验证 Stage1 保存 cleaned_data.csv · Stage2 重新加载 · 无原始数据复用</text>
  <rect x="750" y="615" width="280" height="30" rx="6" fill="#064E3B" fill-opacity="0.4" stroke="#10B981" stroke-opacity="0.25"/>
  <text x="890" y="635" text-anchor="middle" fill="#6EE7B7" font-size="11">execution_audit.py</text>
  <line x1="350" y1="650" x2="350" y2="675" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrGray)"/>

  <!-- ═══ Stage 8: Report Contract ═══ -->
  <circle cx="350" cy="695" r="18" fill="#10B981"/>
  <text x="350" y="700" text-anchor="middle" fill="white" font-size="13" font-weight="700">8</text>
  <text x="385" y="693" fill="#F8FAFC" font-size="14" font-weight="600">报告契约检查</text>
  <text x="385" y="711" fill="#94A3B8" font-size="11">7个必需章节 + 图表解读 + 效应量/CI + 因果语言 + 引用验证</text>
  <rect x="750" y="680" width="280" height="30" rx="6" fill="#064E3B" fill-opacity="0.4" stroke="#10B981" stroke-opacity="0.25"/>
  <text x="890" y="700" text-anchor="middle" fill="#6EE7B7" font-size="11">report_contract.py · symbolic_rules.py</text>
  <line x1="350" y1="715" x2="350" y2="738" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrGray)"/>

  <!-- ═══ Stage 9: Review Loop ═══ -->
  <rect x="180" y="740" width="500" height="95" rx="12" fill="#450A0A" fill-opacity="0.25" stroke="#EF4444" stroke-opacity="0.35" stroke-width="1.5"/>
  <circle cx="350" cy="768" r="14" fill="#EF4444"/>
  <text x="350" y="772" text-anchor="middle" fill="white" font-size="11" font-weight="700">9</text>
  <text x="380" y="766" fill="#F8FAFC" font-size="12" font-weight="600">审稿循环</text>
  <text x="380" y="782" fill="#F87171" font-size="10">draft=0轮 · standard=1轮 · publication=2轮+视觉审稿</text>

  <circle cx="350" cy="808" r="14" fill="#EF4444" fill-opacity="0.6"/>
  <text x="350" y="812" text-anchor="middle" fill="white" font-size="10" font-weight="700">9v</text>
  <text x="380" y="806" fill="#F8FAFC" font-size="12" font-weight="600">视觉审稿 (可选)</text>
  <text x="380" y="822" fill="#F87171" font-size="10">vision_review.py · 可配置视觉模型图表审核</text>

  <rect x="750" y="748" width="280" height="75" rx="8" fill="#450A0A" fill-opacity="0.2" stroke="#EF4444" stroke-opacity="0.15"/>
  <text x="890" y="770" text-anchor="middle" fill="#FCA5A5" font-size="11">review_service.py</text>
  <text x="890" y="788" text-anchor="middle" fill="#F87171" font-size="10">build_reviewer_task()</text>
  <text x="890" y="805" text-anchor="middle" fill="#F87171" font-size="10">parse_reviewer_reply() → accept/reject</text>

  <line x1="350" y1="835" x2="350" y2="858" stroke="#94A3B8" stroke-width="1" marker-end="url(#arrGray)"/>

  <!-- ═══ Stage 10: Memory Writeback ═══ -->
  <circle cx="350" cy="875" r="18" fill="#8B5CF6"/>
  <text x="350" y="880" text-anchor="middle" fill="white" font-size="13" font-weight="700">10</text>
  <text x="385" y="873" fill="#F8FAFC" font-size="14" font-weight="600">记忆回写</text>
  <text x="385" y="891" fill="#94A3B8" font-size="11">成功 → SuccessMemory · 失败 → FailureMemory · ChromaDB 持久化</text>

  <!-- Rejection loop arrow -->
  <path d="M620,795 C710,820 710,680 620,670" stroke="#EF4444" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrRed)"/>
  <text x="720" y="745" fill="#F87171" font-size="10">reject → 修订</text>

  <!-- Output indicator -->
  <rect x="1080" y="920" width="240" height="30" rx="8" fill="#06B6D4" fill-opacity="0.08" stroke="#06B6D4" stroke-opacity="0.25"/>
  <text x="1200" y="940" text-anchor="middle" fill="#67E8F9" font-size="11" font-weight="600">AnalysisRunResult</text>
  <line x1="368" y1="935" x2="1080" y2="935" stroke="#06B6D4" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrCyan)"/>
</svg>
