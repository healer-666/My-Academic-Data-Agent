<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="'Segoe UI','Microsoft YaHei',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0B1220"/><stop offset="1" stop-color="#111C2F"/></linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.22"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#94A3B8"/></marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#3B82F6"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#10B981"/></marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/></marker>
    <style>
      .title{fill:#F8FAFC;font-size:30px;font-weight:800;letter-spacing:0}
      .sub{fill:#A8B3C7;font-size:14px}
      .section{fill:#F8FAFC;font-size:16px;font-weight:800}
      .label{fill:#F8FAFC;font-size:14px;font-weight:750}
      .small{fill:#B9C5D8;font-size:12px}
      .tiny{fill:#9DAAC0;font-size:11px}
      .code{fill:#C7D2FE;font-size:11px;font-family:'Cascadia Mono','Consolas',monospace}
    </style>
  </defs>
  <rect width="1280" height="720" rx="18" fill="url(#bg)"/>
  <text class="title" x="640" y="44" text-anchor="middle">审稿循环与质量模式</text>
  <text class="sub" x="640" y="70" text-anchor="middle">程序化检查门 + 独立审稿人 + 修订循环 + 可选视觉审稿</text>
<rect x="70" y="104" width="1140" height="110" rx="14" fill="#132D2B" stroke="#10B981" stroke-opacity="0.45" filter="url(#shadow)"/>
<rect x="70" y="104" width="5" height="110" rx="3" fill="#10B981"/>
<text class="section" x="88" y="133" fill="#10B981">前置检查门：程序化阻断</text>
<text class="small" x="88" y="155" >报告进入审稿人之前，先通过硬规则检查</text>
<rect x="120" y="150" width="500" height="42" rx="8" fill="#10B981" fill-opacity="0.14" stroke="#10B981" stroke-opacity="0.62"/>
<text class="label" x="370.0" y="176.0" text-anchor="middle">Gate 1 execution_audit：清洗保存、重读、无复用</text>
<line x1="620" y1="171" x2="662" y2="171" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
<rect x="662" y="150" width="500" height="42" rx="8" fill="#10B981" fill-opacity="0.14" stroke="#10B981" stroke-opacity="0.62"/>
<text class="label" x="912.0" y="176.0" text-anchor="middle">Gate 2 report_contract：章节、图表、统计、引用</text>
<rect x="70" y="246" width="1140" height="190" rx="14" fill="#1D1B2D" stroke="#EF4444" stroke-opacity="0.45" filter="url(#shadow)"/>
<rect x="70" y="246" width="5" height="190" rx="3" fill="#EF4444"/>
<text class="section" x="88" y="275" fill="#EF4444">审稿循环 Review Loop</text>
<text class="small" x="88" y="297" >独立审稿人判断 ACCEPT / REJECT，失败时生成 revision brief</text>
<rect x="125" y="315" width="150" height="44" rx="8" fill="#3B82F6" fill-opacity="0.14" stroke="#3B82F6" stroke-opacity="0.62"/>
<text class="label" x="200.0" y="334.0" text-anchor="middle">分析员提交</text>
<text class="tiny" x="200.0" y="347" text-anchor="middle">报告 + 图表 + trace</text>
<line x1="275" y1="337" x2="330" y2="337" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="330" y="315" width="165" height="44" rx="8" fill="#EF4444" fill-opacity="0.14" stroke="#EF4444" stroke-opacity="0.62"/>
<text class="label" x="412.5" y="326.0" text-anchor="middle">build_review</text>
<text class="label" x="412.5" y="342.0" text-anchor="middle">er_task()</text>
<text class="tiny" x="412.5" y="347" text-anchor="middle">数据上下文 + 约束</text>
<line x1="495" y1="337" x2="552" y2="337" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="552" y="315" width="165" height="44" rx="8" fill="#EF4444" fill-opacity="0.14" stroke="#EF4444" stroke-opacity="0.62"/>
<text class="label" x="634.5" y="334.0" text-anchor="middle">审稿人 LLM</text>
<text class="tiny" x="634.5" y="347" text-anchor="middle">parse_reviewer_reply()</text>
<line x1="717" y1="337" x2="780" y2="337" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
<polygon points="830,292 885,337 830,382 775,337" fill="#7F1D1D" stroke="#EF4444"/>
<text class="label" x="830" y="342" text-anchor="middle">Accept?</text>
<line x1="885" y1="337" x2="960" y2="337" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>
<rect x="960" y="315" width="150" height="44" rx="8" fill="#10B981" fill-opacity="0.14" stroke="#10B981" stroke-opacity="0.62"/>
<text class="label" x="1035.0" y="342.0" text-anchor="middle">ACCEPT 继续</text>
<path d="M830 382 L830 407 L500 407 L500 371" fill="none" stroke="#EF4444" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrowRed)"/>
<text class="small" x="640" y="400" fill="#FCA5A5" text-anchor="middle">REJECT：生成 revision brief，回到分析循环返修</text>
<rect x="70" y="472" width="1140" height="92" rx="14" fill="#172236" stroke="#334155" stroke-opacity="0.45" filter="url(#shadow)"/>
<rect x="70" y="472" width="5" height="92" rx="3" fill="#334155"/>
<text class="section" x="88" y="501" fill="#334155">质量模式配置</text>
<rect x="120" y="515" width="280" height="36" rx="8" fill="#64748B" fill-opacity="0.14" stroke="#64748B" stroke-opacity="0.62"/>
<text class="label" x="260.0" y="538.0" text-anchor="middle">draft：0 轮审稿，快速探索</text>
<rect x="500" y="515" width="280" height="36" rx="8" fill="#3B82F6" fill-opacity="0.14" stroke="#3B82F6" stroke-opacity="0.62"/>
<text class="label" x="640.0" y="538.0" text-anchor="middle">standard：1 轮审稿，日常分析</text>
<rect x="880" y="515" width="280" height="36" rx="8" fill="#F59E0B" fill-opacity="0.14" stroke="#F59E0B" stroke-opacity="0.62"/>
<text class="label" x="1020.0" y="530.0" text-anchor="middle">publication：2</text>
<text class="label" x="1020.0" y="546.0" text-anchor="middle">轮审稿，可启用视觉审稿</text>
<rect x="70" y="594" width="1140" height="86" rx="14" fill="#1C1F3A" stroke="#8B5CF6" stroke-opacity="0.45" filter="url(#shadow)"/>
<rect x="70" y="594" width="5" height="86" rx="3" fill="#8B5CF6"/>
<text class="section" x="88" y="623" fill="#8B5CF6">视觉审稿 Vision Review（可选）</text>
<text class="small" x="88" y="645" >挑选关键图表 -&gt; 编码图片 -&gt; Vision LLM 检查标签、坐标轴、颜色与图例</text>
<rect x="150" y="635" width="190" height="34" rx="8" fill="#8B5CF6" fill-opacity="0.14" stroke="#8B5CF6" stroke-opacity="0.62"/>
<text class="label" x="245.0" y="649.0" text-anchor="middle">select</text>
<text class="label" x="245.0" y="665.0" text-anchor="middle">candidates</text>
<line x1="340" y1="652.0" x2="410" y2="652.0" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="410" y="635" width="190" height="34" rx="8" fill="#8B5CF6" fill-opacity="0.14" stroke="#8B5CF6" stroke-opacity="0.62"/>
<text class="label" x="505.0" y="657.0" text-anchor="middle">prepare image</text>
<line x1="600" y1="652.0" x2="670" y2="652.0" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="670" y="635" width="190" height="34" rx="8" fill="#8B5CF6" fill-opacity="0.14" stroke="#8B5CF6" stroke-opacity="0.62"/>
<text class="label" x="765.0" y="657.0" text-anchor="middle">Vision LLM</text>
<line x1="860" y1="652.0" x2="930" y2="652.0" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="930" y="635" width="190" height="34" rx="8" fill="#8B5CF6" fill-opacity="0.14" stroke="#8B5CF6" stroke-opacity="0.62"/>
<text class="label" x="1025.0" y="649.0" text-anchor="middle">VisualReviewRe</text>
<text class="label" x="1025.0" y="665.0" text-anchor="middle">sult</text>
</svg>